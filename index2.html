<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Tabs</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* HEADER */

.header{
background:#1e88e5;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

/* TAB GRID */

.tabs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
background:#222;
padding:5px;
}

.tabs button{
padding:12px;
border:none;
background:#333;
color:white;
cursor:pointer;
font-size:14px;
}

.tabs button:hover{
background:#555;
}

.tabs button.active{
background:#1e88e5;
}

/* TAB CONTENT */

.tabcontent{
display:none;
padding:20px;
}

</style>
</head>

<body>

<div class="header">
My Dashboard
</div>

<!-- TAB BUTTONS -->

<div class="tabs">

<button class="tablink active" onclick="openTab(event,'tab1')">Home</button>
<button class="tablink" onclick="openTab(event,'tab2')">Fitness</button>
<button class="tablink" onclick="openTab(event,'tab3')">Diet</button>
<button class="tablink" onclick="openTab(event,'tab4')">Finance</button>

<button class="tablink" onclick="openTab(event,'tab5')">Tracker</button>
<button class="tablink" onclick="openTab(event,'tab6')">Shopping</button>
<button class="tablink" onclick="openTab(event,'tab7')">Attendance</button>
<button class="tablink" onclick="openTab(event,'tab8')">Notes</button>

<button class="tablink" onclick="openTab(event,'tab9')">Reports</button>
<button class="tablink" onclick="openTab(event,'tab10')">Settings</button>

</div>


<!-- TAB CONTENT -->

<div id="tab1" class="tabcontent" style="display:block">
<h2>Home</h2>
<p>Dashboard content</p>
</div>

<div id="tab2" class="tabcontent">
<h2>Fitness</h2>
</div>

<div id="tab3" class="tabcontent">
<h2>Diet</h2>
</div>

<div id="tab4" class="tabcontent">
<h2>Finance</h2>
</div>

<div id="tab5" class="tabcontent">
<h2>Tracker</h2>
</div>

<div id="tab6" class="tabcontent">
<h2>Shopping</h2>
</div>

<div id="tab7" class="tabcontent">
<h2>Attendance</h2>
</div>

<div id="tab8" class="tabcontent">
<h2>Notes</h2>
</div>

<div id="tab9" class="tabcontent">
<h2>Reports</h2>
</div>

<div id="tab10" class="tabcontent">
<h2>Settings</h2>
</div>


<script>

function openTab(evt,tabName){

let content=document.getElementsByClassName("tabcontent");

for(let i=0;i<content.length;i++)
content[i].style.display="none";

let links=document.getElementsByClassName("tablink");

for(let i=0;i<links.length;i++)
links[i].classList.remove("active");

document.getElementById(tabName).style.display="block";

evt.currentTarget.classList.add("active");

}

</script>

</body>
</html>
