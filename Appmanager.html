<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro App Manager + PIN</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

#lockScreen {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#222;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#app { display:none; padding:20px; }

input, button, select { padding:8px; margin:5px; }

button { cursor:pointer; }

.lock-btn { background:#333; color:white; }
.add-btn { background:green; color:white; }
.delete-btn { background:red; color:white; }
.export-btn { background:blue; color:white; }

table { width:100%; border-collapse:collapse; background:white; }

th, td { border:1px solid #ccc; padding:8px; }

th { background:#eee; cursor:pointer; }

tr:hover { background:#f9f9f9; }

input.table-input, select.table-input {
    width:100%;
    border:none;
    background:transparent;
}

.controls {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div id="lockScreen">
    <h2>🔐 Enter PIN</h2>
    <input type="password" id="pinInput" placeholder="Enter PIN">
    <button onclick="unlock()">Unlock</button>
    <button onclick="setPin()">Set / Change PIN</button>
    <p id="msg"></p>
</div>

<!-- MAIN APP -->
<div id="app">

<h2>🚀 App Manager (Locked)</h2>

<div class="controls">
    <button class="lock-btn" onclick="lock()">🔒 Lock</button>
    <button class="add-btn" onclick="addRow()">+ Add</button>

    <input type="text" id="search" placeholder="Search..." onkeyup="render()">
    <input type="date" id="fromDate">
    <input type="date" id="toDate">
    <button onclick="render()">Filter</button>

    <button class="export-btn" onclick="exportCSV()">Export</button>
    <input type="file" onchange="importCSV(event)">

    <button class="delete-btn" onclick="deleteFiltered()">Delete Filtered</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th onclick="sortBy(event,'url')">URL</th>
<th onclick="sortBy(event,'name')">Name</th>
<th onclick="sortBy(event,'type')">Type</th>
<th onclick="sortBy(event,'category')">Category</th>
<th onclick="sortBy(event,'status')">Status</th>
<th onclick="sortBy(event,'updated')">Updated</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>

// 🔐 PIN LOGIC
function getPin() {
    return localStorage.getItem("app_pin");
}

function setPin() {
    let newPin = prompt("Enter new PIN:");
    if(newPin) {
        localStorage.setItem("app_pin", newPin);
        alert("PIN set successfully");
    }
}

function unlock() {
    let input = document.getElementById("pinInput").value;
    let pin = getPin();

    if(!pin) {
        document.getElementById("msg").innerText = "Set PIN first";
        return;
    }

    if(input === pin) {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("msg").innerText = "Wrong PIN";
    }
}

function lock() {
    document.getElementById("lockScreen").style.display = "flex";
    document.getElementById("app").style.display = "none";
}

// INIT LOCK STATE
if(!getPin()) {
    document.getElementById("msg").innerText = "No PIN set. Click Set PIN";
}

// 📊 APP LOGIC (same as before)
let data = JSON.parse(localStorage.getItem("apps") || "[]");
let sortStack = [];
let page = 1;
let pageSize = 10;

function now() { return new Date().toISOString(); }

function save() {
    localStorage.setItem("apps", JSON.stringify(data));
}

function addRow() {
    data.push({url:"",name:"",type:"Web",category:"",status:"Active",updated:now()});
    save(); render();
}

function update(i,f,v) {
    data[i][f]=v;
    data[i].updated=now();
    save(); render();
}

function del(i) {
    data.splice(i,1);
    save(); render();
}

function sortBy(e, field) {
    let ex = sortStack.find(s=>s.field===field);
    if(!e.shiftKey) sortStack=[];
    if(ex) ex.asc=!ex.asc;
    else sortStack.push({field,asc:true});
    render();
}

function applySort(arr) {
    return arr.sort((a,b)=>{
        for(let s of sortStack){
            let v1=a[s.field], v2=b[s.field];
            if(s.field==="updated"){ v1=new Date(v1); v2=new Date(v2); }
            else { v1=(v1||"").toLowerCase(); v2=(v2||"").toLowerCase(); }
            if(v1>v2) return s.asc?1:-1;
            if(v1<v2) return s.asc?-1:1;
        }
        return 0;
    });
}

function filterData() {
    let s=document.getElementById("search").value.toLowerCase();
    let f=document.getElementById("fromDate").value;
    let t=document.getElementById("toDate").value;

    let arr=data.filter(d=>{
        let txt=Object.values(d).join(" ").toLowerCase();
        let ok=txt.includes(s);
        if(f) ok=ok&&new Date(d.updated)>=new Date(f);
        if(t) ok=ok&&new Date(d.updated)<=new Date(t+"T23:59:59");
        return ok;
    });

    return applySort(arr);
}

function render() {
    let tbody=document.getElementById("tbody");
    tbody.innerHTML="";
    let filtered=filterData();

    filtered.forEach((item,idx)=>{
        let i=data.indexOf(item);
        tbody.innerHTML+=`
        <tr>
        <td>${idx+1}</td>
        <td><input class="table-input" value="${item.url}" onchange="update(${i},'url',this.value)">
        <a href="${item.url}" target="_blank">🔗</a></td>
        <td><input class="table-input" value="${item.name}" onchange="update(${i},'name',this.value)"></td>
        <td><select onchange="update(${i},'type',this.value)">
        <option ${item.type=='Web'?'selected':''}>Web</option>
        <option ${item.type=='Mobile'?'selected':''}>Mobile</option>
        </select></td>
        <td><input class="table-input" value="${item.category}" onchange="update(${i},'category',this.value)"></td>
        <td><select onchange="update(${i},'status',this.value)">
        <option ${item.status=='Active'?'selected':''}>Active</option>
        <option ${item.status=='Inactive'?'selected':''}>Inactive</option>
        </select></td>
        <td>${new Date(item.updated).toLocaleString()}</td>
        <td><button class="delete-btn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    save();
}

function exportCSV() {
    let rows=[["URL","Name","Type","Category","Status","Updated"]];
    data.forEach(d=>rows.push(Object.values(d)));
    let csv=rows.map(r=>r.join(",")).join("\n");
    let blob=new Blob([csv]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="apps.csv";
    a.click();
}

function importCSV(e) {
    let file=e.target.files[0];
    let reader=new FileReader();
    reader.onload=()=>{
        let lines=reader.result.split("\n").slice(1);
        lines.forEach(l=>{
            let [url,name,type,cat,status,updated]=l.split(",");
            if(url) data.push({url,name,type,category:cat,status,updated});
        });
        save(); render();
    };
    reader.readAsText(file);
}

function deleteFiltered() {
    if(!confirm("Delete filtered?")) return;
    let filtered=filterData();
    data=data.filter(d=>!filtered.includes(d));
    save(); render();
}

render();

</script>

</body>
</html>
