<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Calculator</title>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:20px;
}
.container{
  width:100%;
  max-width:420px;
}
h1{text-align:center;margin-bottom:10px;}
#modeToggle{
  margin-bottom:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}
#modeToggle:hover{background:#3b82f6;}

.calculator{
  background:#111827;
  padding:15px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.display{
  background:#1f2933;
  border-radius:6px;
  padding:10px;
  font-size:28px;
  text-align:right;
  margin-bottom:10px;
  min-height:50px;
  word-wrap:break-word;
}

.buttons{
  display:grid;
  gap:8px;
}
.buttons.simple{grid-template-columns:repeat(4,1fr);}
.buttons.scientific{grid-template-columns:repeat(6,1fr);}

button{
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}
button:hover{background:#3b82f6;}
button.function{background:#f59e0b;}
button.function:hover{background:#fbbf24;}
button.equals{background:#ef4444; grid-column:span 2;}
button.equals:hover{background:#f87171;}

#history{
  max-height:150px;
  overflow-y:auto;
  margin-top:10px;
  background:#1f2933;
  padding:8px;
  border-radius:6px;
}
.history-item{
  cursor:pointer;
  padding:4px;
}
.history-item:hover{background:#2563eb;}
</style>
</head>
<body>
<div class="container">
<h1>Ultimate Calculator</h1>
<button id="modeToggle">Switch to Scientific</button>

<div class="calculator">
  <div class="display" id="display">0</div>

  <!-- Simple -->
  <div class="buttons simple" id="simpleButtons">
    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="function" onclick="appendOperator('/')">/</button>
    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="function" onclick="appendOperator('*')">*</button>
    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="function" onclick="appendOperator('-')">-</button>
    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button class="equals" onclick="calculate()">=</button>
    <button class="function" onclick="appendOperator('+')">+</button>
    <button class="function" onclick="clearDisplay()">C</button>
    <button class="function" onclick="deleteChar()">DEL</button>
    <button class="function" onclick="appendOperator('%')">%</button>
  </div>

  <!-- Scientific -->
  <div class="buttons scientific" id="scientificButtons" style="display:none;">
    <button class="function" onclick="clearDisplay()">C</button>
    <button class="function" onclick="deleteChar()">DEL</button>
    <button class="function" onclick="appendOperator('%')">%</button>
    <button class="function" onclick="appendOperator('/')">/</button>
    <button class="function" onclick="appendOperator('*')">*</button>
    <button class="function" onclick="appendOperator('-')">-</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="function" onclick="appendOperator('+')">+</button>
    <button class="function" onclick="appendFunction('Math.sqrt(')">√</button>
    <button class="function" onclick="appendFunction('Math.pow(')">x²</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="function" onclick="appendFunction('Math.sin(')">sin</button>
    <button class="function" onclick="appendFunction('Math.cos(')">cos</button>
    <button class="function" onclick="appendFunction('Math.tan(')">tan</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="function" onclick="appendFunction('Math.log(')">log</button>
    <button class="function" onclick="appendFunction('Math.exp(')">exp</button>
    <button class="function" onclick="appendFunction('Math.PI')">π</button>

    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button class="equals" onclick="calculate()">=</button>
    <button class="function" onclick="appendOperator('^')">^</button>
    <button class="function" onclick="appendFunction('Math.abs(')">abs</button>
    <button class="function" onclick="appendFunction('Math.floor(')">floor</button>

    <!-- Memory buttons -->
    <button class="function" onclick="memoryClear()">MC</button>
    <button class="function" onclick="memoryRecall()">MR</button>
    <button class="function" onclick="memoryAdd()">M+</button>
    <button class="function" onclick="memorySubtract()">M-</button>
  </div>
</div>

<div id="history"></div>
</div>

<script>
let display = document.getElementById("display");
let expression = "";
let memory = 0;
let historyArr = [];

// DISPLAY
function updateDisplay(){ display.textContent = expression || "0"; }
function appendNumber(num){ expression += num; updateDisplay(); }
function appendOperator(op){ 
  if(op==='^'){ expression += '**'; } else { expression += op; } 
  updateDisplay();
}
function appendFunction(fn){ expression += fn; updateDisplay(); }
function clearDisplay(){ expression=""; updateDisplay(); }
function deleteChar(){ expression=expression.slice(0,-1); updateDisplay(); }

// CALC
function calculate(){
  try{
    let result = eval(expression);
    addHistory(expression+" = "+result);
    expression = result.toString();
  } catch(e){ expression="Error"; }
  updateDisplay();
}

// HISTORY
const historyEl = document.getElementById("history");
function addHistory(text){
  historyArr.unshift(text);
  renderHistory();
}
function renderHistory(){
  historyEl.innerHTML = "";
  historyArr.forEach(item=>{
    const div = document.createElement("div");
    div.textContent = item;
    div.className="history-item";
    div.onclick = ()=>{ expression = item.split(" = ")[1]; updateDisplay(); }
    historyEl.appendChild(div);
  });
}

// MEMORY
function memoryClear(){ memory=0; }
function memoryRecall(){ expression += memory; updateDisplay(); }
function memoryAdd(){ memory += eval(expression); updateDisplay(); }
function memorySubtract(){ memory -= eval(expression); updateDisplay(); }

// MODE TOGGLE
const simpleButtons=document.getElementById("simpleButtons");
const scientificButtons=document.getElementById("scientificButtons");
const modeToggle=document.getElementById("modeToggle");
let scientificMode=false;

modeToggle.addEventListener("click",()=>{
  scientificMode=!scientificMode;
  if(scientificMode){
    simpleButtons.style.display="none";
    scientificButtons.style.display="grid";
    modeToggle.textContent="Switch to Simple";
  } else {
    simpleButtons.style.display="grid";
    scientificButtons.style.display="none";
    modeToggle.textContent="Switch to Scientific";
  }
});

// KEYBOARD SUPPORT
document.addEventListener("keydown", e=>{
  const key=e.key;
  if(!isNaN(key) || key==="."){ appendNumber(key); }
  else if(key==="+"||key==="-"||key==="*"||key==="/"){ appendOperator(key); }
  else if(key==="Enter"){ calculate(); }
  else if(key==="Backspace"){ deleteChar(); }
  else if(key==="Escape"){ clearDisplay(); }
});
</script>
</body>
</html>
