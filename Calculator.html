<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Pro</title>

<style>

body{
font-family:Arial;
background:#e0e0e0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calculator{
background:#bdbdbd;
padding:20px;
border-radius:12px;
width:380px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

#display{
width:100%;
height:55px;
font-size:24px;
text-align:right;
padding:10px;
border:none;
border-radius:6px;
background:#f5f5f5;
margin-bottom:10px;
}

.controls{
text-align:center;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

button{
height:50px;
font-size:17px;
border:none;
border-radius:6px;
background:#616161;
color:white;
cursor:pointer;
}

button:hover{
background:#424242;
}

.history{
background:white;
height:80px;
overflow:auto;
margin-top:10px;
font-size:14px;
padding:5px;
}

.scientific{
display:none;
}

</style>

</head>

<body>

<div class="calculator">

<div class="controls">

<button onclick="setMode('simple')">Simple</button>
<button onclick="setMode('scientific')">Scientific</button>

<button onclick="toggleAngle()">DEG</button>

</div>

<input id="display">

<div class="grid">

<button class="scientific" onclick="sin()">sin</button>
<button class="scientific" onclick="cos()">cos</button>
<button class="scientific" onclick="tan()">tan</button>
<button class="scientific" onclick="asin()">sin⁻¹</button>
<button class="scientific" onclick="acos()">cos⁻¹</button>

<button class="scientific" onclick="atan()">tan⁻¹</button>
<button class="scientific" onclick="log()">log</button>
<button class="scientific" onclick="sqrt()">√</button>
<button class="scientific" onclick="press(Math.PI)">π</button>
<button onclick="square()">x²</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="percent()">%</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="clearDisplay()">C</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>
<button onclick="calculate()">=</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press('+')">+</button>

</div>

<div class="history" id="history"></div>

</div>

<script>

let display=document.getElementById("display");
let historyBox=document.getElementById("history");

let degreeMode=true;

/* BASIC */

function press(val){
display.value+=val;
}

function clearDisplay(){
display.value="";
}

function calculate(){
try{
let result=eval(display.value);
historyBox.innerHTML+=display.value+" = "+result+"<br>";
display.value=result;
}
catch{
display.value="Error";
}
}

function percent(){
display.value=display.value/100;
}

function square(){
display.value=display.value*display.value;
}

/* ANGLE MODE */

function toggleAngle(){
degreeMode=!degreeMode;
alert(degreeMode?"Degree Mode":"Radian Mode");
}

function toRad(x){
return degreeMode?x*Math.PI/180:x;
}

function fromRad(x){
return degreeMode?x*180/Math.PI:x;
}

/* TRIG */

function sin(){
display.value=Math.sin(toRad(parseFloat(display.value)));
}

function cos(){
display.value=Math.cos(toRad(parseFloat(display.value)));
}

function tan(){
display.value=Math.tan(toRad(parseFloat(display.value)));
}

function asin(){
display.value=fromRad(Math.asin(parseFloat(display.value)));
}

function acos(){
display.value=fromRad(Math.acos(parseFloat(display.value)));
}

function atan(){
display.value=fromRad(Math.atan(parseFloat(display.value)));
}

/* OTHER */

function log(){
display.value=Math.log10(display.value);
}

function sqrt(){
display.value=Math.sqrt(display.value);
}

/* MODE */

function setMode(mode){

let sci=document.querySelectorAll(".scientific");

sci.forEach(btn=>{
btn.style.display=(mode==="scientific")?"block":"none";
});

}

setMode("simple");

/* KEYBOARD SUPPORT */

document.addEventListener("keydown",function(e){

if("0123456789+-*/.".includes(e.key)){
display.value+=e.key;
}

if(e.key==="Enter"){
calculate();
}

if(e.key==="Backspace"){
display.value=display.value.slice(0,-1);
}

});

</script>

</body>
</html>
