<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brick Breaker Game</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
touch-action:none;
}

canvas{
background:#000;
display:block;
margin:auto;
border:2px solid white;
}
</style>
</head>

<body>

<h1>🧱 Brick Breaker Game</h1>
<p>Drag your finger to move the paddle</p>

<canvas id="game" width="900" height="900"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let ballX=canvas.width/2;
let ballY=canvas.height-30;
let dx=2;
let dy=-2;

let paddleHeight=10;
let paddleWidth=80;
let paddleX=(canvas.width-paddleWidth)/2;

let score=0;
let lives=3;

let brickRow=5;
let brickCol=7;
let brickWidth=55;
let brickHeight=20;
let brickPadding=10;
let brickTop=30;
let brickLeft=30;

let bricks=[];

for(let c=0;c<brickCol;c++){
bricks[c]=[];
for(let r=0;r<brickRow;r++){
bricks[c][r]={x:0,y:0,status:1};
}
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowRight") paddleX+=25;
if(e.key=="ArrowLeft") paddleX-=25;
});

canvas.addEventListener("touchstart",movePaddle,{passive:false});
canvas.addEventListener("touchmove",movePaddle,{passive:false});

function movePaddle(e){

e.preventDefault();

let rect=canvas.getBoundingClientRect();
let touchX=e.touches[0].clientX-rect.left;

paddleX=touchX-paddleWidth/2;

if(paddleX<0) paddleX=0;
if(paddleX>canvas.width-paddleWidth) paddleX=canvas.width-paddleWidth;

}

function drawBall(){
ctx.beginPath();
ctx.arc(ballX,ballY,8,0,Math.PI*2);
ctx.fillStyle="#00ffcc";
ctx.fill();
ctx.closePath();
}

function drawPaddle(){
ctx.beginPath();
ctx.rect(paddleX,canvas.height-paddleHeight,paddleWidth,paddleHeight);
ctx.fillStyle="#00ffcc";
ctx.fill();
ctx.closePath();
}

function drawBricks(){

for(let c=0;c<brickCol;c++){
for(let r=0;r<brickRow;r++){

if(bricks[c][r].status==1){

let brickX=(c*(brickWidth+brickPadding))+brickLeft;
let brickY=(r*(brickHeight+brickPadding))+brickTop;

bricks[c][r].x=brickX;
bricks[c][r].y=brickY;

ctx.beginPath();
ctx.rect(brickX,brickY,brickWidth,brickHeight);
ctx.fillStyle="#ff4444";
ctx.fill();
ctx.closePath();

}

}
}

}

function collision(){

for(let c=0;c<brickCol;c++){
for(let r=0;r<brickRow;r++){

let b=bricks[c][r];

if(b.status==1){

if(ballX>b.x && ballX<b.x+brickWidth && ballY>b.y && ballY<b.y+brickHeight){

dy=-dy;
b.status=0;
score++;

if(score==brickRow*brickCol){

alert("🎉 YOU WIN!");
document.location.reload();

}

}

}

}

}

}

function drawScore(){
ctx.font="16px Arial";
ctx.fillStyle="white";
ctx.fillText("Score: "+score,8,20);
}

function drawLives(){
ctx.font="16px Arial";
ctx.fillStyle="white";
ctx.fillText("Lives: "+lives,400,20);
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawBricks();
drawBall();
drawPaddle();
drawScore();
drawLives();

collision();

if(ballX+dx>canvas.width-8 || ballX+dx<8){
dx=-dx;
}

if(ballY+dy<8){
dy=-dy;
}
else if(ballY+dy>canvas.height-8){

if(ballX>paddleX && ballX<paddleX+paddleWidth){
dy=-dy;
}else{

lives--;

if(!lives){
alert("Game Over");
document.location.reload();
}else{

ballX=canvas.width/2;
ballY=canvas.height-30;
dx=2;
dy=-2;
paddleX=(canvas.width-paddleWidth)/2;

}

}

}

ballX+=dx;
ballY+=dy;

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
