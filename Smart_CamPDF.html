<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Camera to PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    font-family: Arial;
    background: #111;
    color: white;
}

/* Camera */
.camera-container {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Controls */
.controls {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
}

button, input, select {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* Preview */
.preview {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    background: #f0f0f0;
    padding: 10px;
}

.card {
    background: white;
    margin: 5px;
    padding: 8px;
    border-radius: 10px;
    width: 130px;
    color: black;
}

img {
    width: 100%;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="camera-container">
    <video id="video" autoplay playsinline></video>

    <div class="controls">
        <button onclick="capture()">📸 Capture</button>
        <input type="file" accept="image/*" multiple onchange="importImages(event)">
        <br>

        <label>Compression:
        <select id="quality">
            <option value="1">High</option>
            <option value="0.7">Medium</option>
            <option value="0.5">Low</option>
        </select>
        </label>

        <br>

        <button onclick="generatePDF()">📄 PDF</button>
        <button onclick="runOCR()">🔍 OCR</button>
    </div>
</div>

<h3 id="total" style="text-align:center; color:black;">Total Pages: 0</h3>
<div class="preview" id="preview"></div>

<script>
let images = [];
const video = document.getElementById("video");

// Camera
navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
    }
}).then(stream => video.srcObject = stream);

// Capture
function capture() {
    const width = video.videoWidth;
    const height = video.videoHeight;

    if (!width || !height) {
        alert("Camera not ready");
        return;
    }

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, width, height);

    saveImage(canvas.toDataURL("image/jpeg", 1));
}

// Import
function importImages(event) {
    const files = event.target.files;
    for(let file of files) {
        const reader = new FileReader();
        reader.onload = e => saveImage(e.target.result);
        reader.readAsDataURL(file);
    }
}

// Save (REAL resolution fix)
function saveImage(src) {
    let img = new Image();

    img.onload = function() {
        let sizeKB = Math.round((src.length * 3) / 4 / 1024);

        images.push({
            src: src,
            width: img.naturalWidth,
            height: img.naturalHeight,
            size: sizeKB
        });

        render();
    };

    img.src = src;
}

// Delete
function deleteImage(i) {
    images.splice(i,1);
    render();
}

// Drag reorder
let dragIndex;
function dragStart(i){ dragIndex = i; }
function drop(i){
    let item = images.splice(dragIndex,1)[0];
    images.splice(i,0,item);
    render();
}

// Render
function render() {
    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    images.forEach((img, i) => {
        preview.innerHTML += `
        <div class="card" draggable="true"
            ondragstart="dragStart(${i})"
            ondragover="event.preventDefault()"
            ondrop="drop(${i})">
            <img src="${img.src}">
            <p>Page ${i+1}</p>
            <p>${img.width} x ${img.height}</p>
            <p>${img.size} KB</p>
            <button onclick="deleteImage(${i})">❌</button>
        </div>`;
    });

    document.getElementById("total").innerText = "Total Pages: " + images.length;
}

// 🔥 PRINT PERFECT PDF
function generatePDF() {
    if(images.length === 0) return alert("No images");

    let quality = parseFloat(document.getElementById("quality").value);

    images.forEach((img, index) => {

        // Auto orientation
        let orientation = img.width > img.height ? 'landscape' : 'portrait';

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            orientation: orientation,
            unit: "mm",
            format: "a4"
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        const imgRatio = img.width / img.height;
        const pageRatio = pageWidth / pageHeight;

        let w, h;

        if (imgRatio > pageRatio) {
            w = pageWidth;
            h = w / imgRatio;
        } else {
            h = pageHeight;
            w = h * imgRatio;
        }

        const x = (pageWidth - w) / 2;
        const y = (pageHeight - h) / 2;

        pdf.addImage(img.src, 'JPEG', x, y, w, h, '', 'FAST');

        if(index === 0){
            window.finalPDF = pdf;
        } else {
            window.finalPDF.addPage([pageWidth, pageHeight], orientation);
            window.finalPDF.addImage(img.src, 'JPEG', x, y, w, h, '', 'FAST');
        }
    });

    window.finalPDF.save("Print_Perfect.pdf");
}

// OCR
async function runOCR() {
    if(images.length === 0) return;

    alert("Processing OCR...");
    let text = "";

    for(let img of images){
        const res = await Tesseract.recognize(img.src, 'eng');
        text += res.data.text + "\n\n";
    }

    console.log(text);
    alert("OCR Done (check console)");
}
</script>

</body>
</html>
