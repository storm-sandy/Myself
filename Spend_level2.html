<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Excel Style Expense Tracker</title>

<style>
body{
font-family:Arial;
background:#f3f4f6;
padding:20px;
text-align:center;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#e8e8e8;
}

input,select{
width:95%;
padding:5px;
}

button{
padding:6px 10px;
cursor:pointer;
}

#totalBox{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>💰 Excel Style Expense Tracker</h2>

<button onclick="addRow()">Add Expense</button>
<button onclick="exportCSV()">Export CSV</button>

<br><br>

<table id="expenseTable">
<tr>
<th>Date</th>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
<th>Update</th>
</tr>
</table>

<div id="totalBox">Total: ₹0</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")||[])

function save(){
localStorage.setItem("expenses",JSON.stringify(expenses))
}

function addRow(d="",desc="",cat="Food",amt=""){

let table=document.getElementById("expenseTable")
let row=table.insertRow()

row.innerHTML=`
<td><input type="date" value="${d}"></td>
<td><input value="${desc}" placeholder="Description"></td>
<td>
<select>
<option ${cat=="Food"?"selected":""}>Food</option>
<option ${cat=="Travel"?"selected":""}>Travel</option>
<option ${cat=="Shopping"?"selected":""}>Shopping</option>
<option ${cat=="Bills"?"selected":""}>Bills</option>
<option ${cat=="Other"?"selected":""}>Other</option>
</select>
</td>
<td><input type="number" value="${amt}" placeholder="Amount"></td>
<td><button onclick="updateRow()">Update</button></td>
`

}

function updateRow(){

saveTable()
calculateTotal()

}

function saveTable(){

expenses=[]

let rows=document.querySelectorAll("#expenseTable tr")

rows.forEach((r,i)=>{

if(i==0)return

expenses.push({
date:r.cells[0].children[0].value,
desc:r.cells[1].children[0].value,
cat:r.cells[2].children[0].value,
amt:r.cells[3].children[0].value
})

})

save()

}

function calculateTotal(){

let total=0

expenses.forEach(e=>{
total+=Number(e.amt)||0
})

document.getElementById("totalBox").innerText="Total: ₹"+total

}

function exportCSV(){

saveTable()

let csv="Date,Description,Category,Amount\n"

expenses.forEach(e=>{
csv+=`${e.date},${e.desc},${e.cat},${e.amt}\n`
})

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="expense_report.csv"
a.click()

}

function load(){

expenses.forEach(e=>{
addRow(e.date,e.desc,e.cat,e.amt)
})

calculateTotal()

}

load()

</script>

</body>
</html>
