<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>100 Greetings</title>
<style>
body{
font-family:Arial, sans-serif;
background:#f2f7ff;
text-align:center;
padding:20px;
}
h1{
color:#333;
}
#greetBox{
background:white;
padding:20px;
margin:20px auto;
border-radius:10px;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
font-size:22px;
}
button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:#007BFF;
color:white;
cursor:pointer;
}
button:hover{
background:#0056b3;
}
ul{
text-align:left;
max-width:700px;
margin:auto;
}
li{
margin:5px 0;
}
</style>
</head>

<body>

<h1>🌎 100 Greetings</h1>

<div id="greetBox">Click the button to see a greeting!</div>
<button onclick="randomGreeting()">Show Random Greeting</button>

<h2>All Greetings</h2>
<ul id="greetingList"></ul>

<script>

let greetings = [
"Hello",
"Hi",
"Hey",
"Good morning",
"Good afternoon",
"Good evening",
"Good day",
"Nice to meet you",
"How are you?",
"How's it going?",
"How do you do?",
"Welcome",
"Warm greetings",
"Pleasure to meet you",
"Glad to see you",
"Great to see you",
"Long time no see",
"Hope you're doing well",
"Hope you are having a great day",
"Have a wonderful day",

"Good to see you",
"Lovely to meet you",
"Happy to meet you",
"Greetings friend",
"Hello there",
"Hi there",
"Hey there",
"Warm welcome",
"Nice seeing you",
"Pleased to meet you",
"Good to have you here",
"Hope you're well",
"Best wishes",
"All the best",
"Take care",
"Stay well",
"Stay safe",
"Sending warm wishes",
"Wishing you happiness",
"Hope everything is good",

"Hope you're having a good day",
"Great to meet you",
"Hello my friend",
"Hi everyone",
"Good to see everyone",
"Warm regards",
"Kind regards",
"Best regards",
"Sending greetings",
"Friendly greetings",

"Peace be with you",
"Salutations",
"Respectful greetings",
"Heartfelt greetings",
"Hello and welcome",
"Hi and welcome",
"Greetings to you",
"Pleasant greetings",
"Bright greetings",
"Joyful greetings",

"Smiling greetings",
"Happy greetings",
"Cheerful greetings",
"Positive greetings",
"Sunny greetings",
"Friendly hello",
"Kind hello",
"Warm hello",
"Happy hello",
"Bright hello",

"Good vibes to you",
"Wishing you well",
"Hope you are happy",
"Greetings and smiles",
"Sending smiles",
"Hello sunshine",
"Hi buddy",
"Hello friend",
"Hi friend",
"Hello everyone",

"Greetings everyone",
"Lovely greetings",
"Bright day to you",
"Hope your day is great",
"Nice day to you",
"Have a great day",
"Have a nice day",
"Wishing you a great day",
"Have a wonderful morning",
"Enjoy your day",

"Hello again",
"Nice to see you again",
"Welcome back",
"Good to have you back",
"Glad you're here",
"Happy to see you",
"Great to see you again",
"Warm hello to you",
"Hello and smiles",
"Greetings with joy"
];

let list = document.getElementById("greetingList");

greetings.forEach((g,i)=>{
let li=document.createElement("li");
li.textContent=(i+1)+". "+g;
list.appendChild(li);
});

function randomGreeting(){
let g=greetings[Math.floor(Math.random()*greetings.length)];
document.getElementById("greetBox").innerText=g;
}

</script>

</body>
</html>
