<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PWA IndexedDB CRUD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
<style>

body { font-family: Arial; padding: 10px; background:#f5f5f5;font-size: 40px; }
textarea, input, button { width:100%; margin:5px 0; padding:8px; }
.note { background:#fff; padding:10px; margin:8px 0; border-radius:5px; }
.btn { display:flex; gap:5px; }
button { cursor:pointer; }
</style>
</head>

<body>

<h3>📒 Daily Notes (IndexedDB)</h3>

<input type="date" id="date">
<textarea id="text" placeholder="Write note..."></textarea>
<button onclick="addNote()">➕ Save</button>

<hr>

<input type="date" id="searchDate">
<button onclick="searchByDate()">🔍 Search</button>
<button onclick="loadNotes()">♻ Load All</button>

<div id="notes"></div>

<script>
let db;
let editId = null;

const request = indexedDB.open("pwaNotesDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  const store = db.createObjectStore("notes", {
    keyPath: "id",
    autoIncrement: true
  });
  store.createIndex("date", "date", { unique: false });
};

request.onsuccess = e => {
  db = e.target.result;
  loadNotes();
};

function addNote() {
  const text = document.getElementById("text").value;
  const date = document.getElementById("date").value;
  if (!text || !date) return alert("Fill all fields");

  const tx = db.transaction("notes", "readwrite");
  const store = tx.objectStore("notes");

  if (editId) {
    store.put({ id: editId, text, date });
    editId = null;
  } else {
    store.add({ text, date });
  }

  tx.oncomplete = () => {
    document.getElementById("text").value = "";
    loadNotes();
  };
}

function loadNotes() {
  const tx = db.transaction("notes", "readonly");
  const store = tx.objectStore("notes");
  store.getAll().onsuccess = e => display(e.target.result);
}

function display(data) {
  const div = document.getElementById("notes");
  div.innerHTML = "";

  data.reverse().forEach(n => {
    div.innerHTML += `
      <div class="note">
        <b>${n.date}</b>
        <p>${n.text}</p>
        <div class="btn">
          <button onclick="editNote(${n.id}, '${n.text}', '${n.date}')">✏</button>
          <button onclick="deleteNote(${n.id})">❌</button>
        </div>
      </div>`;
  });
}

function editNote(id, text, date) {
  editId = id;
  document.getElementById("text").value = text;
  document.getElementById("date").value = date;
}

function deleteNote(id) {
  const tx = db.transaction("notes", "readwrite");
  tx.objectStore("notes").delete(id);
  tx.oncomplete = loadNotes;
}

function searchByDate() {
  const date = document.getElementById("searchDate").value;
  if (!date) return;

  const tx = db.transaction("notes", "readonly");
  const index = tx.objectStore("notes").index("date");

  const result = [];
  index.openCursor(IDBKeyRange.only(date)).onsuccess = e => {
    const cursor = e.target.result;
    if (cursor) {
      result.push(cursor.value);
      cursor.continue();
    } else {
      display(result);
    }
  };
}
</script>

</body>
</html>
