<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance System</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{text-align:center}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-bottom:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#333;
color:white;
}

button{
padding:6px 10px;
margin:3px;
cursor:pointer;
}

canvas{
width:100%;
height:300px;
background:white;
border:1px solid #ccc;
}

.controls{
text-align:center;
margin-bottom:10px;
}

.report{
background:white;
padding:10px;
border:1px solid #ccc;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Daily Attendance System</h2>

<div class="controls">
<button onclick="addRow()">Add Attendance</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="monthlyReport()">Monthly Report</button>
<button onclick="clearAll()">Clear All</button>
</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total Hours</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Daily Hours Vertical Bar Graph</h3>
<canvas id="chart"></canvas>

<div class="report" id="report"></div>

<script>

let table=document.querySelector("#table tbody")

function getTime(){
return new Date().toLocaleTimeString()
}

function getDate(){
return new Date().toISOString().split("T")[0]
}

function addRow(){

let row=table.insertRow()

row.innerHTML=`
<td contenteditable="true">Name</td>
<td>${getDate()}</td>
<td>${getTime()}</td>
<td><button onclick="timeOut(this)">Time Out</button></td>
<td>0</td>
<td contenteditable="true"></td>
<td><button onclick="deleteRow(this)">Delete</button></td>
`

saveData()
updateGraph()

}

function timeOut(btn){

let row=btn.parentElement.parentElement

let inTime=row.cells[2].innerText
let outTime=getTime()

row.cells[3].innerText=outTime

let start=new Date("1970/01/01 "+inTime)
let end=new Date("1970/01/01 "+outTime)

let diff=(end-start)/3600000

row.cells[4].innerText=diff.toFixed(2)

saveData()
updateGraph()

}

function deleteRow(btn){
btn.parentElement.parentElement.remove()
saveData()
updateGraph()
}

function saveData(){
localStorage.setItem("attendanceData",table.innerHTML)
}

function loadData(){
let data=localStorage.getItem("attendanceData")
if(data) table.innerHTML=data
}

function clearAll(){
if(confirm("Clear all data?")){
localStorage.removeItem("attendanceData")
table.innerHTML=""
updateGraph()
}
}

function exportCSV(){

let rows=document.querySelectorAll("table tr")
let csv=[]

rows.forEach(r=>{
let cols=r.querySelectorAll("td,th")
let row=[]
cols.forEach(c=>row.push(c.innerText))
csv.push(row.join(","))
})

let blob=new Blob([csv.join("\n")])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="attendance.csv"
a.click()

}

function updateGraph(){

let dates=[]
let hours=[]

let rows=table.querySelectorAll("tr")

rows.forEach(r=>{

let date=r.cells[1]?.innerText
let h=parseFloat(r.cells[4]?.innerText)

if(date && !isNaN(h)){
dates.push(date)
hours.push(h)
}

})

drawGraph(dates,hours)

}

function drawGraph(labels,data){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

canvas.width=canvas.offsetWidth
canvas.height=300

ctx.clearRect(0,0,canvas.width,canvas.height)

let max=Math.max(...data,1)

let margin=40
let graphHeight=200
let graphBottom=250

let barWidth=(canvas.width-margin*2)/data.length

ctx.beginPath()
ctx.moveTo(margin,graphBottom)
ctx.lineTo(canvas.width-margin,graphBottom)
ctx.stroke()

data.forEach((v,i)=>{

let barHeight=(v/max)*graphHeight

let x=margin+i*barWidth+10
let y=graphBottom-barHeight

ctx.fillStyle="#2196F3"

ctx.fillRect(x,y,barWidth-20,barHeight)

ctx.fillStyle="#000"
ctx.font="10px Arial"

ctx.fillText(labels[i],x-5,graphBottom+15)
ctx.fillText(v+"h",x+5,y-5)

})

}

function monthlyReport(){

let rows=table.querySelectorAll("tr")

let totalHours=0
let days=0

rows.forEach(r=>{

let h=parseFloat(r.cells[4]?.innerText)

if(!isNaN(h)){
totalHours+=h
days++
}

})

let avg=days?totalHours/days:0

document.getElementById("report").innerHTML=

`
<h3>Monthly Attendance Report</h3>

Total Days Present : ${days}<br>
Total Hours Worked : ${totalHours.toFixed(2)}<br>
Average Hours / Day : ${avg.toFixed(2)}
`

}

window.addEventListener("resize",updateGraph)

loadData()
updateGraph()

</script>

</body>
</html>
