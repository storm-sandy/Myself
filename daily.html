<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Dashboard</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{text-align:center}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-bottom:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#333;
color:white;
}

td{
cursor:text;
}

button{
padding:6px 10px;
margin:3px;
cursor:pointer;
}

canvas{
width:100%;
height:320px;
background:white;
border:1px solid #ccc;
margin-bottom:20px;
}

.controls{
text-align:center;
margin-bottom:10px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
background:white;
padding:10px;
border:1px solid #ccc;
}

.day{
padding:10px;
border:1px solid #ddd;
text-align:center;
font-size:12px;
}

.present{background:#b2f2bb}
.absent{background:#ffb3b3}

.report{
background:white;
padding:10px;
border:1px solid #ccc;
margin-top:10px;
}

</style>
</head>

<body>

<h2>Attendance Dashboard</h2>

<div class="controls">
<button onclick="addRow()">Add Attendance</button>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="monthlyReport()">Monthly Report</button>
<button onclick="clearAll()">Clear All</button>
</div>

<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Total Hours</th>
<th>Remarks</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Daily Hours Graph</h3>
<canvas id="chart"></canvas>

<h3>Monthly Calendar</h3>
<div id="calendar" class="calendar"></div>

<div id="report" class="report"></div>

<script>

let table=document.querySelector("#table tbody")

function nowTime(){
return new Date().toLocaleTimeString()
}

function today(){
return new Date().toISOString().split("T")[0]
}

function addRow(){

let row=table.insertRow()

row.innerHTML=`
<td contenteditable="true">Name</td>
<td contenteditable="true">${today()}</td>
<td contenteditable="true">${nowTime()}</td>
<td contenteditable="true"></td>
<td>0</td>
<td contenteditable="true"></td>
<td><button onclick="deleteRow(this)">Delete</button></td>
`

saveData()
updateGraph()
generateCalendar()

}

function deleteRow(btn){
btn.parentElement.parentElement.remove()
saveData()
updateAll()
}

function clearAll(){
if(confirm("Clear all data?")){
localStorage.removeItem("attendanceData")
table.innerHTML=""
updateAll()
}
}

function saveData(){
localStorage.setItem("attendanceData",table.innerHTML)
}

function loadData(){
let data=localStorage.getItem("attendanceData")
if(data) table.innerHTML=data
}

function updateAll(){
calculateHours()
updateGraph()
generateCalendar()
}

document.addEventListener("input",function(e){

if(e.target.closest("table")){
calculateHours()
saveData()
updateGraph()
generateCalendar()
}

})

function calculateHours(){

let rows=table.querySelectorAll("tr")

rows.forEach(r=>{

let inTime=r.cells[2]?.innerText
let outTime=r.cells[3]?.innerText

if(inTime && outTime){

let start=new Date("1970/01/01 "+inTime)
let end=new Date("1970/01/01 "+outTime)

let diff=(end-start)/3600000

if(!isNaN(diff)){
r.cells[4].innerText=diff.toFixed(2)
}

}

})

}

function exportCSV(){

let rows=document.querySelectorAll("table tr")
let csv=[]

rows.forEach(r=>{
let cols=r.querySelectorAll("td,th")
let row=[]
cols.forEach(c=>row.push(c.innerText))
csv.push(row.join(","))
})

let blob=new Blob([csv.join("\n")])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="attendance.csv"
a.click()

}

function updateGraph(){

let labels=[]
let data=[]

let rows=table.querySelectorAll("tr")

rows.forEach(r=>{

let date=r.cells[1]?.innerText
let h=parseFloat(r.cells[4]?.innerText)

if(date && !isNaN(h)){
labels.push(date)
data.push(h)
}

})

drawGraph(labels,data)

}

function drawGraph(labels,data){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

canvas.width=canvas.offsetWidth
canvas.height=320

ctx.clearRect(0,0,canvas.width,canvas.height)

let max=Math.max(...data,8)

let margin=40
let height=200
let bottom=260

for(let i=0;i<=max;i++){

let y=bottom-(i/max)*height

ctx.strokeStyle="#eee"
ctx.beginPath()
ctx.moveTo(margin,y)
ctx.lineTo(canvas.width-margin,y)
ctx.stroke()

ctx.fillStyle="#000"
ctx.fillText(i+"h",5,y+3)

}

let barWidth=(canvas.width-margin*2)/data.length

data.forEach((v,i)=>{

let barHeight=(v/max)*height
let x=margin+i*barWidth+10
let y=bottom-barHeight

ctx.fillStyle="#4CAF50"
ctx.fillRect(x,y,barWidth-20,barHeight)

ctx.fillStyle="#000"
ctx.fillText(labels[i].slice(5),x,280)

})

}

function generateCalendar(){

let calendar=document.getElementById("calendar")
calendar.innerHTML=""

let rows=table.querySelectorAll("tr")
let status={}

rows.forEach(r=>{

let date=r.cells[1]?.innerText
let hours=parseFloat(r.cells[4]?.innerText)

if(date){

let day=date.split("-")[2]

if(hours>0){
status[day]="present"
}else{
status[day]="absent"
}

}

})

for(let i=1;i<=31;i++){

let dayStr=String(i).padStart(2,"0")

let div=document.createElement("div")
div.className="day"

if(status[dayStr]=="present") div.classList.add("present")
if(status[dayStr]=="absent") div.classList.add("absent")

div.innerText=i

calendar.appendChild(div)

}

}

function monthlyReport(){

let rows=table.querySelectorAll("tr")

let totalHours=0
let days=0

rows.forEach(r=>{

let h=parseFloat(r.cells[4]?.innerText)

if(!isNaN(h)){
totalHours+=h
days++
}

})

let avg=days?totalHours/days:0

document.getElementById("report").innerHTML=

`
<h3>Monthly Attendance Report</h3>
Days Present : ${days}<br>
Total Hours : ${totalHours.toFixed(2)}<br>
Average Hours / Day : ${avg.toFixed(2)}
`

}

window.addEventListener("resize",updateGraph)

loadData()
updateAll()

</script>

</body>
</html>
