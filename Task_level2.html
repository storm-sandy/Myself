<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Excel Style Task Tracker</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
text-align:center;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#e8e8e8;
}

button{
padding:6px 10px;
cursor:pointer;
}

.completed{
background:#d4ffd4;
}
</style>

</head>

<body>

<h2>📊 Excel Style Task Tracker</h2>

<button onclick="addRow()">Add Task Row</button>

<br><br>

<table id="taskTable">
<tr>
<th>Task</th>
<th>Deadline</th>
<th>Status</th>
<th>Completed Date</th>
<th>Action</th>
</tr>
</table>

<script>

let tasks = JSON.parse(localStorage.getItem("excelTasks") || "[]");

function save(){
localStorage.setItem("excelTasks",JSON.stringify(tasks));
}

function addRow(task="",deadline="",status="Pending",completed=""){

let table=document.getElementById("taskTable");

let row=table.insertRow();

let cell1=row.insertCell();
let cell2=row.insertCell();
let cell3=row.insertCell();
let cell4=row.insertCell();
let cell5=row.insertCell();

cell1.innerHTML=`<input value="${task}" placeholder="Task details">`;

cell2.innerHTML=`<input type="date" value="${deadline}">`;

cell3.innerHTML=`
<select>
<option ${status=="Pending"?"selected":""}>Pending</option>
<option ${status=="Completed"?"selected":""}>Completed</option>
</select>
`;

cell4.innerHTML=`<span>${completed}</span>`;

cell5.innerHTML=`<button onclick="updateRow(this)">Update</button>`;

if(status=="Completed"){
row.classList.add("completed");
}

}

function updateRow(btn){

let row=btn.parentNode.parentNode;

let task=row.cells[0].children[0].value;
let date=row.cells[1].children[0].value;
let status=row.cells[2].children[0].value;

let completedCell=row.cells[3];

let completed="";

if(status=="Completed"){
completed=new Date().toLocaleString();
completedCell.innerHTML=completed;
row.classList.add("completed");
}

saveTable();

}

function saveTable(){

tasks=[];

let rows=document.querySelectorAll("#taskTable tr");

rows.forEach((r,i)=>{

if(i==0) return;

let task=r.cells[0].children[0].value;
let date=r.cells[1].children[0].value;
let status=r.cells[2].children[0].value;
let completed=r.cells[3].innerText;

tasks.push({task,date,status,completed});

});

save();

}

function load(){

tasks.forEach(t=>{
addRow(t.task,t.date,t.status,t.completed);
});

}

load();

</script>

</body>
</html>
