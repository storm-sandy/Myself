<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Lunar & Solar Planner OS</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;text-align:center;margin:0;padding:0;}
header{background:#4285f4;color:white;padding:12px;font-size:22px;}
.container{max-width:1200px;margin:auto;padding:10px;}
.navbar{margin:15px;}
button{padding:6px 12px;margin:2px;font-size:14px;}
select{padding:5px;font-size:14px;}
table{width:100%;border-collapse:collapse;margin:10px 0;}
td,th{padding:6px;text-align:center;border:1px solid #ccc;font-size:14px;cursor:pointer;}
.today{background:#fbbc05;color:black;font-weight:bold;}
.moon{font-size:16px;display:block;}
.info{margin:10px;background:#e8f0fe;padding:10px;border-radius:8px;}
.progress{width:80%;height:15px;background:#ccc;border-radius:8px;margin:10px auto;overflow:hidden;}
.bar{height:100%;background:#4285f4;width:0%;}
#clock{width:150px;height:150px;border:4px solid #222;border-radius:50%;margin:auto;position:relative;}
.hand{position:absolute;top:50%;left:50%;transform-origin:0% 50%;background:#222;}
.hour{width:40px;height:4px;}
.minute{width:60px;height:3px;}
.second{width:70px;height:2px;background:red;}
</style>
</head>
<body>

<header>🌞🌙 Ultimate Lunar & Solar Planner OS</header>

<div class="container">
<div id="clock"></div>
<div id="digitalClock" style="margin:10px;font-size:18px;"></div>

<div class="navbar">
<button onclick="prevMonth()">◀ Previous</button>
<select id="monthSelect" onchange="gotoMonth()"></select>
<button onclick="nextMonth()">Next ▶</button>
</div>

<div id="calendarContainer"></div>

<div class="info" id="dayInfo">Click a day to see Moon & Sun details</div>
<div class="progress"><div class="bar" id="progressBar"></div></div>

<div style="margin:10px;">
Latitude: <input type="number" id="lat" placeholder="Lat" step="0.0001" value="19.0760">
Longitude: <input type="number" id="lon" placeholder="Lon" step="0.0001" value="72.8777">
<button onclick="updateLocation()">Update Location</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

<script>
const lunarCycle=29.53058867;
const knownNewMoon=new Date("2000-01-06T18:14:00Z");
let now=new Date();
let currentMonth=now.getMonth();
let currentYear=now.getFullYear();
let latitude=19.0760, longitude=72.8777;
const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
const phaseNames=["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"];
const phaseIcons=["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];

function moonPhaseIcon(age){if(age<1) return "🌑"; else if(age<7.4) return "🌒"; else if(age<8.9) return "🌓"; else if(age<14.7) return "🌔"; else if(age<16) return "🌕"; else if(age<22) return "🌖"; else if(age<23.5) return "🌗"; else return "🌘";}
function moonPhaseName(age){if(age<1) return "New Moon"; else if(age<7.4) return "Waxing Crescent"; else if(age<8.9) return "First Quarter"; else if(age<14.7) return "Waxing Gibbous"; else if(age<16) return "Full Moon"; else if(age<22) return "Waning Gibbous"; else if(age<23.5) return "Last Quarter"; else return "Waning Crescent";}

function populateMonthSelect(){const select=document.getElementById("monthSelect");select.innerHTML="";monthNames.forEach((m,i)=>{let opt=document.createElement("option");opt.value=i;opt.text=m;select.appendChild(opt);});select.value=currentMonth;}

function generateCalendar(year,month){
const firstDay=new Date(year,month,1);
const lastDay=new Date(year,month+1,0);
const startDay=firstDay.getDay();
const totalDays=lastDay.getDate();
let html=`<h2>${monthNames[month]} ${year}</h2><table><tr><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr>`;
let dayCount=1;
for(let i=0;i<6;i++){
html+="<tr>";
for(let j=0;j<7;j++){
if(i===0 && j<startDay){html+="<td></td>";}
else if(dayCount>totalDays){html+="<td></td>";}
else{
const current=new Date(year,month,dayCount);
const age=(current-knownNewMoon)/86400000%lunarCycle;
const icon=moonPhaseIcon(age);
const cls=(current.toDateString()===now.toDateString())?"today":"";
html+=`<td class='${cls}' onclick="showDayInfo(${dayCount})">${dayCount}<span class='moon'>${icon}</span></td>`;
dayCount++;
}
}
html+="</tr>";
}
html+="</table>";
document.getElementById("calendarContainer").innerHTML=html;
}

function showDayInfo(day){
const date=new Date(currentYear,currentMonth,day);
const age=(date-knownNewMoon)/86400000%lunarCycle;
const nextFull=new Date(date); nextFull.setDate(nextFull.getDate()+(14.76-age<0?14.76-age+29.53:14.76-age));
const nextNew=new Date(date); nextNew.setDate(nextNew.getDate()+(29.53-age));

const sunTimes=SunCalc.getTimes(date,latitude,longitude);
const moonTimes=SunCalc.getMoonTimes(date,latitude,longitude);

document.getElementById("dayInfo").innerHTML=
`<strong>${date.toDateString()}</strong><br>
Phase: ${moonPhaseName(age)} ${moonPhaseIcon(age)}<br>
Moon age: ${age.toFixed(2)} days<br>
Fraction illuminated: ${(Math.sin(age/lunarCycle*Math.PI*2)*50+50).toFixed(1)}%<br>
Moonrise: ${moonTimes.rise?moonTimes.rise.toLocaleTimeString():"N/A"} | Moonset: ${moonTimes.set?moonTimes.set.toLocaleTimeString():"N/A"}<br>
Sunrise: ${sunTimes.sunrise.toLocaleTimeString()} | Sunset: ${sunTimes.sunset.toLocaleTimeString()}<br>
Next Full Moon: ${nextFull.toDateString()}<br>
Next New Moon: ${nextNew.toDateString()}`;

document.getElementById("progressBar").style.width=(age/lunarCycle*100).toFixed(1)+"%";
}

function prevMonth(){currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} populateMonthSelect(); generateCalendar(currentYear,currentMonth);}
function nextMonth(){currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} populateMonthSelect(); generateCalendar(currentYear,currentMonth);}
function gotoMonth(){const sel=document.getElementById("monthSelect"); currentMonth=parseInt(sel.value); generateCalendar(currentYear,currentMonth);}
function updateLocation(){latitude=parseFloat(document.getElementById("lat").value)||latitude; longitude=parseFloat(document.getElementById("lon").value)||longitude; showDayInfo(now.getDate());}

populateMonthSelect();
generateCalendar(currentYear,currentMonth);
showDayInfo(now.getDate());

// Digital & analog clock
function analogClock(){
const c=document.getElementById("clock");
if(!c.hand){c.hand={hour:document.createElement("div"),minute:document.createElement("div"),second:document.createElement("div")}; c.appendChild(c.hand.hour); c.appendChild(c.hand.minute); c.appendChild(c.hand.second);
c.hand.hour.className="hand hour"; c.hand.minute.className="hand minute"; c.hand.second.className="hand second";}
const now=new Date();
const s=now.getSeconds(), m=now.getMinutes(), h=now.getHours();
c.hand.second.style.transform=`rotate(${s*6}deg)`;
c.hand.minute.style.transform=`rotate(${m*6+s*0.1}deg)`;
c.hand.hour.style.transform=`rotate(${(h%12)*30+m*0.5}deg)`;
document.getElementById("digitalClock").innerText=now.toLocaleTimeString();
}
setInterval(analogClock,1000);
analogClock();
</script>

</body>
</html>
