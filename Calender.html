<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Ultimate Panchang Calendar</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
}

header{
background:#ff5722;
color:white;
padding:10px;
}

#clock{
font-size:20px;
margin:10px;
}

#controls{
margin:10px;
}

button{
padding:8px;
margin:5px;
}

#panchang{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2196f3;
color:white;
padding:5px;
}

td{
border:1px solid #ddd;
height:40px;
}

.today{
background:#4caf50;
color:white;
}

.festival{
background:#ffeb3b;
}

</style>
</head>

<body>

<header>
<h2>भारतीय पंचांग कैलेंडर PRO</h2>
</header>

<div id="clock"></div>

<div id="controls">
<button onclick="changeMonth(-1)">◀ पिछला</button>
<span id="monthYear"></span>
<button onclick="changeMonth(1)">अगला ▶</button>
</div>

<div id="panchang"></div>

<table id="calendar"></table>

<script>

let current=new Date();

let months=["जनवरी","फरवरी","मार्च","अप्रैल","मई","जून","जुलाई","अगस्त","सितंबर","अक्टूबर","नवंबर","दिसंबर"];

let weekdays=["रवि","सोम","मंगल","बुध","गुरु","शुक्र","शनि"];

/* FESTIVALS */

let festivals={
"01-01":"New Year",
"01-26":"गणतंत्र दिवस",
"02-14":"Valentine Day",
"03-08":"महिला दिवस",
"08-15":"स्वतंत्रता दिवस",
"10-02":"गांधी जयंती",
"12-25":"क्रिसमस"
};

/* CLOCK */

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=
"आज: "+now.toLocaleDateString("hi-IN")+
" | समय: "+now.toLocaleTimeString("hi-IN");

}

setInterval(updateClock,1000);

/* CALENDAR */

function renderCalendar(){

let year=current.getFullYear();
let month=current.getMonth();

document.getElementById("monthYear").innerText=
months[month]+" "+year;

let first=new Date(year,month,1).getDay();
let days=new Date(year,month+1,0).getDate();

let html="<tr>";

for(let w of weekdays) html+="<th>"+w+"</th>";

html+="</tr><tr>";

for(let i=0;i<first;i++) html+="<td></td>";

for(let d=1;d<=days;d++){

let key=(month+1).toString().padStart(2,'0')+"-"+d.toString().padStart(2,'0');

let cls="";

if(d===new Date().getDate() && month===new Date().getMonth()) cls="today";

if(festivals[key]) cls="festival";

html+="<td class='"+cls+"'>"+d;

if(festivals[key]) html+="<br>"+festivals[key];

html+="</td>";

if((first+d)%7===0) html+="</tr><tr>";

}

html+="</tr>";

document.getElementById("calendar").innerHTML=html;

}

/* NAVIGATION */

function changeMonth(n){

current.setMonth(current.getMonth()+n);

renderCalendar();

}

/* PANCHANG */

function panchang(){

let now=new Date();

let weekday=["रविवार","सोमवार","मंगलवार","बुधवार","गुरुवार","शुक्रवार","शनिवार"];

let tithi=(now.getDate()%30)+1;

let nakshatra=[
"अश्विनी","भरणी","कृत्तिका","रोहिणी","मृगशीर्ष",
"आर्द्रा","पुनर्वसु","पुष्य","आश्लेषा","मघा"
];

let yoga=["विष्कुंभ","प्रीति","आयुष्मान","सौभाग्य"];

let karana=["बव","बालव","कौलव","तैतिल"];

let moonPhase=["अमावस्या","शुक्ल पक्ष","पूर्णिमा","कृष्ण पक्ष"];

/* Sunrise Sunset basic */

let sunrise="06:30";
let sunset="18:30";

let moon=moonPhase[Math.floor(Math.random()*moonPhase.length)];

document.getElementById("panchang").innerHTML=
"<b>आज का पंचांग</b><br>"+
"वार: "+weekday[now.getDay()]+"<br>"+
"तिथि: "+tithi+"<br>"+
"नक्षत्र: "+nakshatra[now.getDate()%nakshatra.length]+"<br>"+
"योग: "+yoga[now.getDate()%yoga.length]+"<br>"+
"करण: "+karana[now.getDate()%karana.length]+"<br>"+
"चंद्र अवस्था: "+moon+"<br>"+
"सूर्योदय: "+sunrise+"<br>"+
"सूर्यास्त: "+sunset;

}

/* START */

renderCalendar();
panchang();

</script>

</body>
</html>
