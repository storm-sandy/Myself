<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Life OS Calendar</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin:10px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
max-width:900px;
margin:auto;
}

.day{
background:#1e293b;
padding:8px;
height:90px;
border-radius:6px;
cursor:pointer;
}

.day:hover{
background:#334155;
}

.holiday{
color:#facc15;
font-size:11px;
}

#info{
margin-top:20px;
padding:10px;
background:#1e293b;
border-radius:10px;
max-width:700px;
margin:auto;
}
</style>
</head>

<body>

<h1>Ultimate Life OS Calendar</h1>

<select id="month"></select>
<select id="year"></select>

<div id="calendar"></div>

<div id="info">
<h3>Day Details</h3>
<p id="date"></p>
<p id="panchang"></p>
<p id="moon"></p>
<p id="sun"></p>
<p id="festival"></p>
</div>

<script>

let months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let indianFestivals={
"1-26":"Republic Day 🇮🇳",
"3-25":"Holi",
"8-15":"Independence Day 🇮🇳",
"10-2":"Gandhi Jayanti",
"11-1":"Diwali 🪔"
};

let internationalHolidays={
"1-1":"New Year 🌍",
"2-14":"Valentine ❤️",
"12-25":"Christmas 🎄"
};

let tithi=[
"Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami","Shashthi",
"Saptami","Ashtami","Navami","Dashami","Ekadashi","Dwadashi",
"Trayodashi","Chaturdashi","Purnima"
];

let nakshatra=[
"Ashwini","Bharani","Krittika","Rohini","Mrigashira",
"Ardra","Punarvasu","Pushya","Ashlesha"
];

function moonPhase(day){
let phases=[
"New Moon",
"Waxing Crescent",
"First Quarter",
"Waxing Gibbous",
"Full Moon",
"Waning Gibbous",
"Last Quarter",
"Waning Crescent"
];
return phases[day%8];
}

function buildSelectors(){

let m=document.getElementById("month");
let y=document.getElementById("year");

months.forEach((v,i)=>{
m.innerHTML+=`<option value=${i}>${v}</option>`;
});

for(let i=2020;i<=2035;i++){
y.innerHTML+=`<option>${i}</option>`;
}

m.value=new Date().getMonth();
y.value=new Date().getFullYear();

}

function buildCalendar(){

let calendar=document.getElementById("calendar");
calendar.innerHTML="";

let month=document.getElementById("month").value;
let year=document.getElementById("year").value;

let firstDay=new Date(year,month,1).getDay();
let days=new Date(year,Number(month)+1,0).getDate();

for(let i=0;i<firstDay;i++){
calendar.innerHTML+="<div></div>";
}

for(let d=1;d<=days;d++){

let key=(Number(month)+1)+"-"+d;

let festival=indianFestivals[key]||internationalHolidays[key]||"";

calendar.innerHTML+=`
<div class="day" onclick="showDay(${d})">
<b>${d}</b>
<div class="holiday">${festival}</div>
</div>
`;
}

}

function showDay(day){

let t=tithi[day%15];
let n=nakshatra[day%9];
let moon=moonPhase(day);

document.getElementById("date").innerText="Date : "+day;
document.getElementById("panchang").innerText=
"Panchang : Tithi "+t+" | Nakshatra "+n;

document.getElementById("moon").innerText=
"Moon Phase : "+moon;

document.getElementById("sun").innerText=
"Sunrise ~ 6:30 AM | Sunset ~ 6:30 PM";

let month=document.getElementById("month").value;
let key=(Number(month)+1)+"-"+day;

let festival=indianFestivals[key]||internationalHolidays[key]||"None";

document.getElementById("festival").innerText=
"Festival : "+festival;

}

document.getElementById("month").onchange=buildCalendar;
document.getElementById("year").onchange=buildCalendar;

buildSelectors();
buildCalendar();

</script>

</body>
</html>
