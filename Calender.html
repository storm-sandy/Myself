<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Ultimate Panchang Calendar</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#ff5722;
color:white;
padding:10px;
}

#clock{
font-size:20px;
margin:10px;
}

#moon{
font-size:18px;
margin:10px;
}

#panchang{
background:white;
padding:10px;
margin:10px;
border-radius:8px;
}

#controls{
margin:10px;
}

button{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2196f3;
color:white;
padding:5px;
}

td{
border:1px solid #ddd;
height:55px;
font-size:20px;
}

.today{
background:#4caf50;
color:white;
}

.festival{
background:#ffeb3b;
}

</style>
</head>

<body>

<header>
<h2>Ultimate Panchang Calendar</h2>
</header>

<div id="clock"></div>

<div id="moon"></div>

<div id="controls">
<button onclick="changeMonth(-1)">◀</button>
<span id="monthYear"></span>
<button onclick="changeMonth(1)">▶</button>
</div>

<div id="panchang"></div>

<table id="calendar"></table>

<script>

/* CLOCK */

function clock(){
let now=new Date();
document.getElementById("clock").innerHTML=
"आज: "+now.toLocaleDateString("hi-IN")+
" | समय: "+now.toLocaleTimeString("hi-IN");
}
setInterval(clock,1000);
clock();

/* MOON PHASE */

function moonPhase(){

let now=new Date();
let lp=2551443;
let new_moon=new Date(1970,0,7,20,35,0);
let phase=((now-new_moon)/1000)%lp;
let index=Math.floor(phase/(lp/8));

let phases=[
"🌑 अमावस्या",
"🌒 शुक्ल चंद्र",
"🌓 प्रथम चरण",
"🌔 शुक्ल पक्ष",
"🌕 पूर्णिमा",
"🌖 कृष्ण पक्ष",
"🌗 अंतिम चरण",
"🌘 कृष्ण चंद्र"
];

document.getElementById("moon").innerHTML="चंद्र अवस्था: "+phases[index];

}

moonPhase();

/* FESTIVALS */

let festivals={

"01-01":"New Year",
"01-14":"मकर संक्रांति",
"01-26":"गणतंत्र दिवस",
"02-14":"Valentine Day",
"03-08":"महिला दिवस",
"03-04":"होली",
"04-17":"राम नवमी",
"04-21":"महावीर जयंती",
"05-23":"बुद्ध पूर्णिमा",
"08-15":"स्वतंत्रता दिवस",
"08-26":"कृष्ण जन्माष्टमी",
"09-07":"गणेश चतुर्थी",
"10-02":"गांधी जयंती",
"10-12":"दशहरा",
"11-01":"करवा चौथ",
"11-12":"दीवाली",
"11-15":"भाई दूज",
"12-25":"क्रिसमस"

};

/* WORLD HOLIDAYS SAMPLE */

let worldHolidays={
"01-27":"International Holocaust Day",
"02-04":"World Cancer Day",
"03-22":"World Water Day",
"04-22":"Earth Day",
"05-01":"Labour Day",
"06-05":"World Environment Day",
"07-11":"World Population Day",
"09-21":"International Peace Day",
"10-24":"United Nations Day"
};

/* CALENDAR */

let current=new Date();

let months=[
"जनवरी","फरवरी","मार्च","अप्रैल",
"मई","जून","जुलाई","अगस्त",
"सितंबर","अक्टूबर","नवंबर","दिसंबर"
];

let weekdays=["रवि","सोम","मंगल","बुध","गुरु","शुक्र","शनि"];

function renderCalendar(){

let year=current.getFullYear();
let month=current.getMonth();

document.getElementById("monthYear").innerText=
months[month]+" "+year;

let first=new Date(year,month,1).getDay();
let days=new Date(year,month+1,0).getDate();

let html="<tr>";

for(let w of weekdays) html+="<th>"+w+"</th>";

html+="</tr><tr>";

for(let i=0;i<first;i++) html+="<td></td>";

for(let d=1;d<=days;d++){

let key=(month+1).toString().padStart(2,'0')+"-"+d.toString().padStart(2,'0');

let cls="";

if(d===new Date().getDate() && month===new Date().getMonth())
cls="today";

if(festivals[key] || worldHolidays[key])
cls="festival";

html+="<td class='"+cls+"'>"+d;

if(festivals[key])
html+="<br>"+festivals[key];

if(worldHolidays[key])
html+="<br>"+worldHolidays[key];

html+="</td>";

if((first+d)%7===0) html+="</tr><tr>";

}

html+="</tr>";

document.getElementById("calendar").innerHTML=html;

}

function changeMonth(n){

current.setMonth(current.getMonth()+n);
renderCalendar();

}

/* PANCHANG */

function panchang(){

let now=new Date();

let weekday=[
"रविवार","सोमवार","मंगलवार","बुधवार",
"गुरुवार","शुक्रवार","शनिवार"
];

let nakshatra=[
"अश्विनी","भरणी","कृत्तिका","रोहिणी","मृगशीर्ष",
"आर्द्रा","पुनर्वसु","पुष्य","आश्लेषा","मघा",
"पूर्वा फाल्गुनी","उत्तर फाल्गुनी"
];

let tithi=(now.getDate()%30)+1;

document.getElementById("panchang").innerHTML=

"<b>आज का पंचांग</b><br>"+
"वार: "+weekday[now.getDay()]+"<br>"+
"तिथि: "+tithi+"<br>"+
"नक्षत्र: "+nakshatra[now.getDate()%nakshatra.length]+"<br>"+
"सूर्योदय: 06:30<br>"+
"सूर्यास्त: 18:30";

}

panchang();
renderCalendar();

</script>

</body>
</html>
