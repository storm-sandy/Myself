<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food Log Tracker</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:15px;
border-radius:8px;
}

input,select,button{
padding:6px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

th{
background:#eee;
}

.calendar{
margin-top:20px;
}

.cal-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.cal-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:2px;
margin-top:5px;
}

.day{
background:#eee;
padding:8px;
cursor:pointer;
min-height:60px;
font-size:12px;
}

.week{
background:#ccc;
font-weight:bold;
text-align:center;
}

.calorie{
font-size:10px;
}

.nutrition{
margin-top:10px;
font-weight:bold;
}

button.small{
font-size:10px;
padding:2px 5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Food Log Tracker</h2>

Date <input type="date" id="date">
Time <input type="time" id="time">

<select id="meal">
<option>Breakfast</option>
<option>Morning Snack</option>
<option>Lunch</option>
<option>Evening Snack</option>
<option>Dinner</option>
</select>

<input type="text" id="food" placeholder="Food description">
<input type="number" id="cal" placeholder="Calories">
<input type="number" id="protein" placeholder="Protein g">
<input type="number" id="carbs" placeholder="Carbs g">
<input type="number" id="fat" placeholder="Fat g">

<button onclick="addFood()">Add</button>

<br>

<input type="text" id="search" placeholder="Search food or date" onkeyup="searchFood()">

<button onclick="showAll()">Show Full Records</button>
<button onclick="exportCSV()">Export CSV</button>
<input type="file" onchange="importCSV(event)">

<table id="table">
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Meal</th>
<th>Food</th>
<th>Calories</th>
<th>Protein</th>
<th>Carbs</th>
<th>Fat</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="nutrition">
Calories: <span id="tcal">0</span> |
Protein: <span id="tpro">0</span>g |
Carbs: <span id="tcarb">0</span>g |
Fat: <span id="tfat">0</span>g
</div>

<div class="calendar">

<div class="cal-header">
<button onclick="prevMonth()">◀</button>
<h3 id="monthYear"></h3>
<button onclick="nextMonth()">▶</button>
</div>

<div class="cal-grid" id="calendar"></div>

</div>

</div>

<script>

let foodData=JSON.parse(localStorage.getItem("foodData"))||[];
let editIndex=-1;

function save(){
localStorage.setItem("foodData",JSON.stringify(foodData));
}

function addFood(){

let r={
date:date.value,
time:time.value,
meal:meal.value,
food:food.value,
cal:cal.value,
protein:protein.value,
carbs:carbs.value,
fat:fat.value
};

if(!r.date || !r.food) return;

if(editIndex==-1){
foodData.push(r);
}else{
foodData[editIndex]=r;
editIndex=-1;
}

save();
renderTable(foodData);
buildCalendar();

}

function renderTable(data){

let tbody=document.querySelector("#table tbody");
tbody.innerHTML="";

let cal=0,pro=0,car=0,fat=0;

data.forEach((r,i)=>{

let tr=document.createElement("tr");

tr.innerHTML=
`<td>${r.date}</td>
<td>${r.time}</td>
<td>${r.meal}</td>
<td>${r.food}</td>
<td>${r.cal||0}</td>
<td>${r.protein||0}</td>
<td>${r.carbs||0}</td>
<td>${r.fat||0}</td>
<td>
<button class="small" onclick="editRecord(${i})">Edit</button>
<button class="small" onclick="deleteRecord(${i})">Delete</button>
</td>`;

tbody.appendChild(tr);

cal+=Number(r.cal||0);
pro+=Number(r.protein||0);
car+=Number(r.carbs||0);
fat+=Number(r.fat||0);

});

tcal.innerText=cal;
tpro.innerText=pro;
tcarb.innerText=car;
tfat.innerText=fat;

}

function editRecord(i){

let r=foodData[i];

date.value=r.date;
time.value=r.time;
meal.value=r.meal;
food.value=r.food;
cal.value=r.cal;
protein.value=r.protein;
carbs.value=r.carbs;
fat.value=r.fat;

editIndex=i;

}

function deleteRecord(i){

foodData.splice(i,1);

save();
renderTable(foodData);
buildCalendar();

}

function searchFood(){

let q=search.value.toLowerCase();

let f=foodData.filter(r=>
r.food.toLowerCase().includes(q) ||
r.date.includes(q)
);

renderTable(f);

}

function showAll(){
renderTable(foodData);
}

function exportCSV(){

let csv="date,time,meal,food,calories,protein,carbs,fat\n";

foodData.forEach(r=>{
csv+=`${r.date},${r.time},${r.meal},${r.food},${r.cal},${r.protein},${r.carbs},${r.fat}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="foodlog.csv";
a.click();

}

function importCSV(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

let lines=reader.result.split("\n");

lines.slice(1).forEach(l=>{

let c=l.split(",");

if(c.length>3){

foodData.push({
date:c[0],
time:c[1],
meal:c[2],
food:c[3],
cal:c[4],
protein:c[5],
carbs:c[6],
fat:c[7]
});

}

});

save();
renderTable(foodData);
buildCalendar();

};

reader.readAsText(file);

}

/* CALENDAR */

let current=new Date();

function getCalories(date){

let t=0;

foodData.forEach(r=>{
if(r.date==date){
t+=Number(r.cal||0);
}
});

return t;

}

function buildCalendar(){

let year=current.getFullYear();
let month=current.getMonth();

let first=new Date(year,month,1).getDay();
let days=new Date(year,month+1,0).getDate();

monthYear.innerText=
current.toLocaleString("default",{month:"long"})+" "+year;

calendar.innerHTML="";

let week=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

week.forEach(d=>{
let div=document.createElement("div");
div.className="week";
div.innerText=d;
calendar.appendChild(div);
});

for(let i=0;i<first;i++){
calendar.appendChild(document.createElement("div"));
}

for(let d=1;d<=days;d++){

let date=
year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

let cals=getCalories(date);

let div=document.createElement("div");
div.className="day";

div.innerHTML=`<b>${d}</b><div class="calorie">${cals} cal</div>`;

div.onclick=function(){

let f=foodData.filter(r=>r.date==date);
renderTable(f);

};

calendar.appendChild(div);

}

}

function prevMonth(){
current.setMonth(current.getMonth()-1);
buildCalendar();
}

function nextMonth(){
current.setMonth(current.getMonth()+1);
buildCalendar();
}

renderTable(foodData);
buildCalendar();

</script>

</body>
</html>
