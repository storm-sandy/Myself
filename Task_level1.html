<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Manager</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{text-align:center}

input,select{
padding:6px;
width:100%;
box-sizing:border-box;
border:none;
background:transparent;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{background:#eee}

.overdue{
background:#ffd6d6;
}

</style>
</head>

<body>

<h2>Task Manager</h2>

<h3>Task Status Chart</h3>
<canvas id="chart" height="150"></canvas>

<br>

<button onclick="exportCSV()">Export CSV</button>
<input type="file" accept=".csv" onchange="importCSV(event)">

<br><br>

<input id="search" placeholder="Search task..." onkeyup="render()">

<table>

<tr>
<th>Task</th>
<th>Owner</th>
<th>Status</th>
<th>Date</th>
<th>Recurring</th>
<th>Month</th>
<th>Delete</th>
</tr>

<tr>

<td><input id="task"></td>
<td><input id="owner"></td>

<td>
<select id="status">
<option>Pending</option>
<option>Complete</option>
</select>
</td>

<td><input type="date" id="date"></td>

<td>
<select id="recurring">
<option>None</option>
<option>Daily</option>
<option>Weekly</option>
<option>Monthly</option>
</select>
</td>

<td id="monthDisplay"></td>

<td><button onclick="addTask()">Add</button></td>

</tr>

<tbody id="tableData"></tbody>

</table>

<script>

let data=JSON.parse(localStorage.getItem("taskData"))||[];

function getMonth(date){

let d=new Date(date);

let m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

return m[d.getMonth()]+" "+d.getFullYear();

}

document.getElementById("date").addEventListener("change",function(){

if(this.value)
document.getElementById("monthDisplay").innerText=getMonth(this.value);

});

function saveLocal(){

localStorage.setItem("taskData",JSON.stringify(data));
render();

}

function addTask(){

let date=document.getElementById("date").value;

data.push({
task:document.getElementById("task").value,
owner:document.getElementById("owner").value,
status:document.getElementById("status").value,
date:date,
recurring:document.getElementById("recurring").value,
month:getMonth(date)
});

document.getElementById("task").value="";
document.getElementById("owner").value="";
document.getElementById("date").value="";
document.getElementById("monthDisplay").innerText="";

saveLocal();

}

function updateCell(i,key,val){

data[i][key]=val;

if(key=="date")
data[i].month=getMonth(val);

saveLocal();

}

function deleteRow(i){

if(confirm("Delete record?")){
data.splice(i,1);
saveLocal();
}

}

function render(){

let search=document.getElementById("search").value.toLowerCase();

let html="";

let pending=0;
let complete=0;

let today=new Date().toISOString().split("T")[0];

data.forEach((d,i)=>{

if(search && !d.task.toLowerCase().includes(search)) return;

let cls="";

if(d.status=="Pending" && d.date<today)
cls="overdue";

if(d.status=="Pending") pending++;
if(d.status=="Complete") complete++;

html+=`
<tr class="${cls}">
<td><input value="${d.task}" onchange="updateCell(${i},'task',this.value)"></td>
<td><input value="${d.owner}" onchange="updateCell(${i},'owner',this.value)"></td>

<td>
<select onchange="updateCell(${i},'status',this.value)">
<option ${d.status=="Pending"?"selected":""}>Pending</option>
<option ${d.status=="Complete"?"selected":""}>Complete</option>
</select>
</td>

<td><input type="date" value="${d.date}" onchange="updateCell(${i},'date',this.value)"></td>

<td>
<select onchange="updateCell(${i},'recurring',this.value)">
<option ${d.recurring=="None"?"selected":""}>None</option>
<option ${d.recurring=="Daily"?"selected":""}>Daily</option>
<option ${d.recurring=="Weekly"?"selected":""}>Weekly</option>
<option ${d.recurring=="Monthly"?"selected":""}>Monthly</option>
</select>
</td>

<td>${d.month}</td>

<td><button onclick="deleteRow(${i})">Delete</button></td>

</tr>
`;

});

document.getElementById("tableData").innerHTML=html;

drawChart(pending,complete);

}

function drawChart(p,c){

let canvas=document.getElementById("chart");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

let total=p+c || 1;

let start=0;

let pAngle=(p/total)*2*Math.PI;
let cAngle=(c/total)*2*Math.PI;

ctx.beginPath();
ctx.moveTo(150,75);
ctx.arc(150,75,70,start,start+pAngle);
ctx.fillStyle="orange";
ctx.fill();

start+=pAngle;

ctx.beginPath();
ctx.moveTo(150,75);
ctx.arc(150,75,70,start,start+cAngle);
ctx.fillStyle="green";
ctx.fill();

ctx.fillStyle="black";
ctx.fillText("Pending: "+p,10,20);
ctx.fillText("Complete: "+c,10,40);
ctx.fillText("Total: "+total,10,60);

}

function exportCSV(){

let csv="Task,Owner,Status,Date,Recurring,Month\n";

data.forEach(d=>{
csv+=`${d.task},${d.owner},${d.status},${d.date},${d.recurring},${d.month}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="tasks.csv";
a.click();

}

function importCSV(e){

let file=e.target.files[0];
if(!file)return;

let r=new FileReader();

r.onload=function(ev){

let rows=ev.target.result.split("\n").slice(1);

rows.forEach(row=>{

let c=row.split(",");

if(c.length<6)return;

data.push({
task:c[0],
owner:c[1],
status:c[2],
date:c[3],
recurring:c[4],
month:c[5]
});

});

saveLocal();

};

r.readAsText(file);

}

render();

</script>

</body>
</html>
