<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Excel Pro Task Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;text-align:center;}
table{border-collapse:collapse;width:100%;background:white;}
th,td{border:1px solid #ccc;padding:8px;}
th{background:#e9ecef;}
input,select{width:95%;padding:5px;}
button{padding:6px 10px;cursor:pointer;}
.completed{background:#d4edda;}
#dashboard{width:320px;margin:auto;}
</style>
</head>

<body>

<h2>📊 Excel Pro Task Tracker</h2>

<button onclick="addRow()">Add Row</button>
<button onclick="exportCSV()">Export CSV</button>

<br><br>

<table id="taskTable">
<tr>
<th>Task</th>
<th>Owner</th>
<th>Priority</th>
<th>Deadline</th>
<th>Status</th>
<th>Completed Time</th>
<th>Update</th>
</tr>
</table>

<h3>Progress Dashboard</h3>
<div id="dashboard">
<canvas id="chart"></canvas>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")||"[]")
let chart

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function addRow(t="",o="",p="Medium",d="",s="Pending",c=""){

let table=document.getElementById("taskTable")
let row=table.insertRow()

row.innerHTML=`
<td><input value="${t}"></td>
<td><input value="${o}"></td>
<td>
<select>
<option ${p=="Low"?"selected":""}>Low</option>
<option ${p=="Medium"?"selected":""}>Medium</option>
<option ${p=="High"?"selected":""}>High</option>
</select>
</td>
<td><input type="datetime-local" value="${d}"></td>
<td>
<select>
<option ${s=="Pending"?"selected":""}>Pending</option>
<option ${s=="Completed"?"selected":""}>Completed</option>
</select>
</td>
<td>${c}</td>
<td><button onclick="updateRow(this)">Update</button></td>
`

if(s=="Completed") row.classList.add("completed")

}

function updateRow(btn){

let row=btn.parentNode.parentNode
let status=row.cells[4].children[0].value

if(status=="Completed" && !row.cells[5].innerText){

row.cells[5].innerText=new Date().toLocaleString()
row.classList.add("completed")

}

saveTable()
drawChart()

}

function saveTable(){

tasks=[]

let rows=document.querySelectorAll("#taskTable tr")

rows.forEach((r,i)=>{

if(i==0) return

tasks.push({
task:r.cells[0].children[0].value,
owner:r.cells[1].children[0].value,
priority:r.cells[2].children[0].value,
deadline:r.cells[3].children[0].value,
status:r.cells[4].children[0].value,
completed:r.cells[5].innerText
})

})

save()

}

function drawChart(){

let completed=tasks.filter(t=>t.status=="Completed").length
let pending=tasks.length-completed

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"pie",
data:{
labels:["Completed","Pending"],
datasets:[{data:[completed,pending]}]
}
})

}

function exportCSV(){

saveTable()

let csv="Task,Owner,Priority,Deadline,Status,Completed Time\n"

tasks.forEach(t=>{
csv+=`${t.task},${t.owner},${t.priority},${t.deadline},${t.status},${t.completed}\n`
})

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="task_report.csv"
document.body.appendChild(a)
a.click()
document.body.removeChild(a)

}

function load(){

tasks.forEach(t=>{
addRow(t.task,t.owner,t.priority,t.deadline,t.status,t.completed)
})

drawChart()

}

load()

</script>

</body>
</html>
