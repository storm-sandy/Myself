<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>100 School Jokes for Kids</title>
<style>
body{
font-family:Arial, sans-serif;
background:#f0f8ff;
text-align:center;
padding:20px;
}
h1{
color:#333;
}
#jokeBox{
background:white;
padding:20px;
margin:20px auto;
border-radius:10px;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
font-size:20px;
}
button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
}
button:hover{
background:#45a049;
}
ul{
text-align:left;
max-width:700px;
margin:auto;
}
li{
margin:6px 0;
}
</style>
</head>

<body>

<h1>😂 100 School Jokes for Kids</h1>

<div id="jokeBox">Click the button to see a random joke!</div>
<button onclick="randomJoke()">Show Random Joke</button>

<h2>All Jokes</h2>
<ul id="jokeList"></ul>

<script>

let jokes = [
"Why did the student eat his homework? Because the teacher said it was a piece of cake!",
"Why did the math book look sad? Because it had too many problems.",
"Why did the computer go to school? To improve its memory!",
"Why did the teacher wear sunglasses? Because her students were so bright!",
"Why did the student bring a ladder to school? Because he wanted to go to high school!",
"Why was the pencil late for school? It had to draw the line somewhere.",
"Why was the music teacher good at baseball? Because she had perfect pitch!",
"Why did the student sit on his homework? To warm it up!",
"Why did the kid bring a magnet to school? To attract attention!",
"Why did the chalk feel lonely? Because it was always getting rubbed out!",

"Why did the teacher go to the beach? To test the waters!",
"Why did the student study in the airplane? Because he wanted higher grades!",
"Why did the book join the police? It wanted to go undercover!",
"Why did the math teacher love parks? Because of all the natural logs!",
"Why did the clock get detention? It tocked too much!",
"Why did the student cross the playground? To get to the other slide!",
"Why was the classroom so hot? Because the teacher turned up the heat!",
"Why did the ruler get promoted? Because it measured up!",
"Why did the student bring string to school? To tie up loose ends!",
"Why did the eraser feel proud? Because it corrected mistakes!",

"Why did the teacher draw on the window? Because she wanted the lesson to be clear!",
"Why did the student bring glue to school? To stick to the lesson!",
"Why was the teacher happy? Because the class was outstanding!",
"Why did the student sit near the door? For quick exits!",
"Why did the apple stop in the middle of the road? Because it ran out of juice!",
"Why did the history book look old? Because it had so many dates!",
"Why did the student bring soap to school? For clean work!",
"Why did the teacher go to space? To find new stars!",
"Why did the student bring a flashlight? For bright ideas!",
"Why did the chalkboard feel tired? Because it had too many lessons!",

"Why did the science teacher trust atoms? Because they make up everything!",
"Why did the student bring a mirror? To reflect on homework!",
"Why did the teacher like gardening? Because she loved growing minds!",
"Why did the student take a pencil to bed? To draw the curtains!",
"Why did the calculator break up? Too many problems!",
"Why did the student carry a clock? To watch time fly!",
"Why did the teacher write with a broken pencil? It was pointless!",
"Why did the student bring bread to class? For food for thought!",
"Why did the classroom laugh? Because of the funny board!",
"Why did the student bring sunglasses? Because the test was too bright!",

"Why did the geography teacher get lost? Too many directions!",
"Why did the student bring cheese? To improve the class!",
"Why did the teacher sit on the clock? To be on time!",
"Why did the student bring a map? To find the lesson!",
"Why did the classroom smell good? Because of fresh ideas!",
"Why did the teacher love jokes? Because they were class acts!",
"Why did the student bring a fan? To cool the test!",
"Why did the desk feel proud? Because it supported students!",
"Why did the student bring a ladder? To reach new heights!",
"Why did the teacher smile? Because learning is fun!",

"Why did the notebook feel smart? Because it had good notes!",
"Why did the student bring a pillow? For dream homework!",
"Why did the teacher open a bakery? Because she loved teaching batches!",
"Why did the pencil feel famous? Because it was number one!",
"Why did the student sit on a globe? To travel the world!",
"Why did the teacher bring candy? For sweet lessons!",
"Why did the student bring a drum? To beat the test!",
"Why did the book feel cool? Because it had fans!",
"Why did the teacher love math? Because it added up!",
"Why did the student bring a kite? To fly through homework!",

"Why did the teacher bring a ladder? To reach top students!",
"Why did the student bring popcorn? For a pop quiz!",
"Why did the teacher go fishing? To catch good students!",
"Why did the student bring a broom? To sweep exams!",
"Why did the classroom feel happy? Because everyone was bright!",
"Why did the student bring a camera? To capture lessons!",
"Why did the teacher bring paint? To color the lesson!",
"Why did the student bring chocolate? For sweet success!",
"Why did the class sing? Because learning rocks!",
"Why did the teacher bring balloons? To lift spirits!",

"Why did the student bring a telescope? To see the future!",
"Why did the teacher bring flowers? For blooming minds!",
"Why did the student bring a rocket? To launch learning!",
"Why did the teacher love jokes? Because they crack up the class!",
"Why did the student bring a puzzle? To piece together lessons!",
"Why did the classroom shine? Because of bright students!",
"Why did the student bring a star? To be a star student!",
"Why did the teacher clap? Because the class was amazing!",
"Why did the student bring a trophy? For winning knowledge!",
"Why did the class laugh? Because school is fun!"
];

let list = document.getElementById("jokeList");

jokes.forEach((j,i)=>{
let li=document.createElement("li");
li.textContent=(i+1)+". "+j;
list.appendChild(li);
});

function randomJoke(){
let j=jokes[Math.floor(Math.random()*jokes.length)];
document.getElementById("jokeBox").innerText=j;
}

</script>

</body>
</html>
