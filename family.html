<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Personal Details Tracker</title>
<style>
body{font-family:Arial;background:#f0f0f0;padding:10px}
h2{text-align:center}
table{border-collapse:collapse;width:100%;background:#fff}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#444;color:white}
input{width:100%;border:none;text-align:center}
button{padding:8px;margin:5px}
.controls{text-align:center;margin-bottom:10px}
</style>
</head>

<body>

<h2>Family Personal Details</h2>

<div class="controls">
<button onclick="addRow()">Add Member</button>
<button onclick="exportCSV()">Export CSV</button>
<input type="file" onchange="importCSV(event)">
</div>

<table id="familyTable">
<thead>
<tr>
<th>Name</th>
<th>DOB</th>
<th>Age</th>
<th>Gender</th>
<th>Blood</th>
<th>Phone</th>
<th>Aadhaar</th>
<th>Passport</th>
<th>Driving</th>
<th>Height</th>
<th>Weight</th>
<th>Allergy</th>
<th>Bank</th>
<th>Insurance</th>
<th>Emergency</th>
<th>Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let table=document.querySelector("#familyTable tbody")

function addRow(data=[]){

let row=document.createElement("tr")

let cols=15

for(let i=0;i<cols;i++){

let cell=document.createElement("td")
let input=document.createElement("input")

input.value=data[i]||""

if(i==1){
input.type="date"
input.onchange=()=>updateAge(row)
}

input.oninput=saveData

cell.appendChild(input)
row.appendChild(cell)

}

let del=document.createElement("td")
let btn=document.createElement("button")
btn.innerText="X"
btn.onclick=()=>{row.remove();saveData()}
del.appendChild(btn)
row.appendChild(del)

table.appendChild(row)

updateAge(row)

}

function updateAge(row){

let dob=row.cells[1].querySelector("input").value
let ageCell=row.cells[2].querySelector("input")

if(dob){
let birth=new Date(dob)
let age=new Date().getFullYear()-birth.getFullYear()
ageCell.value=age
}

saveData()

}

function saveData(){

let data=[]

table.querySelectorAll("tr").forEach(r=>{
let row=[]
r.querySelectorAll("input").forEach(i=>row.push(i.value))
data.push(row)
})

localStorage.setItem("familyData",JSON.stringify(data))

}

function loadData(){

let data=JSON.parse(localStorage.getItem("familyData")||"[]")
data.forEach(r=>addRow(r))

}

function exportCSV(){

let csv=""

table.querySelectorAll("tr").forEach(r=>{
let row=[]
r.querySelectorAll("input").forEach(i=>row.push(i.value))
csv+=row.join(",")+"\n"
})

let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="family_records.csv"
a.click()

}

function importCSV(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(){

table.innerHTML=""

let rows=reader.result.split("\n")

rows.forEach(r=>{
let data=r.split(",")
if(data.length>1) addRow(data)
})

saveData()

}

reader.readAsText(file)

}

loadData()

</script>

</body>
</html>
