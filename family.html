<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Personal Details Tracker</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
}

h2{
text-align:center;
}

.controls{
text-align:center;
margin-bottom:10px;
}

button{
padding:6px 10px;
margin:3px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
table-layout:fixed;
}

th,td{
border:1px solid #ccc;
padding:5px;
text-align:center;
}

th{
background:#333;
color:white;
}

input{
width:100%;
border:none;
padding:4px;
text-align:center;
}

.name{width:140px}
.dob{width:110px}
.age{width:50px}
.gender{width:80px}
.blood{width:70px}
.phone{width:120px}
.aadhaar{width:150px}
.passport{width:130px}
.driving{width:130px}
.height{width:70px}
.weight{width:70px}
.allergy{width:150px}
.bank{width:130px}
.insurance{width:130px}
.emergency{width:120px}

</style>
</head>

<body>

<h2>Family Personal Details</h2>

<div class="controls">
<button onclick="addRow()">Add Member</button>
<button onclick="exportCSV()">Export CSV</button>
<input type="file" onchange="importCSV(event)">
</div>

<table id="familyTable">

<thead>
<tr>
<th class="name">Name</th>
<th class="dob">DOB (DD-MM-YYYY)</th>
<th class="age">Age</th>
<th class="gender">Gender</th>
<th class="blood">Blood</th>
<th class="phone">Phone</th>
<th class="aadhaar">Aadhaar</th>
<th class="passport">Passport</th>
<th class="driving">Driving</th>
<th class="height">Height</th>
<th class="weight">Weight</th>
<th class="allergy">Allergy</th>
<th class="bank">Bank</th>
<th class="insurance">Insurance</th>
<th class="emergency">Emergency</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let table=document.querySelector("#familyTable tbody")

function addRow(data=[]){

let row=document.createElement("tr")

let cols=15

for(let i=0;i<cols;i++){

let cell=document.createElement("td")
let input=document.createElement("input")

input.value=data[i]||""

if(i==1){
input.placeholder="DD-MM-YYYY"
input.onchange=()=>updateAge(row)
}

input.oninput=saveData

cell.appendChild(input)
row.appendChild(cell)

}

let del=document.createElement("td")

let btn=document.createElement("button")
btn.innerText="X"

btn.onclick=()=>{
row.remove()
saveData()
}

del.appendChild(btn)
row.appendChild(del)

table.appendChild(row)

}

function updateAge(row){

let dob=row.cells[1].querySelector("input").value
let ageCell=row.cells[2].querySelector("input")

if(dob){

let parts=dob.split("-")

if(parts.length==3){

let birthYear=parseInt(parts[2])

let age=new Date().getFullYear()-birthYear

ageCell.value=age

}

}

saveData()

}

function saveData(){

let data=[]

table.querySelectorAll("tr").forEach(r=>{

let row=[]

r.querySelectorAll("input").forEach(i=>row.push(i.value))

data.push(row)

})

localStorage.setItem("familyData",JSON.stringify(data))

}

function loadData(){

let data=JSON.parse(localStorage.getItem("familyData")||"[]")

data.forEach(r=>addRow(r))

}

function exportCSV(){

let csv=""

table.querySelectorAll("tr").forEach(r=>{

let row=[]

r.querySelectorAll("input").forEach(i=>row.push(i.value))

csv+=row.join(",")+"\n"

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="family_records.csv"

a.click()

}

function importCSV(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

table.innerHTML=""

let rows=reader.result.split("\n")

rows.forEach(r=>{

let data=r.split(",")

if(data.length>1) addRow(data)

})

saveData()

}

reader.readAsText(file)

}

loadData()

</script>

</body>
</html>
