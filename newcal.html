<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#e0e0e0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}

.calculator{
background:#bdbdbd;
padding:15px;
border-radius:12px;
width:100%;
max-width:500px;
min-height:95vh;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
}

#display{
width:100%;
height:70px;
font-size:28px;
text-align:right;
padding:10px;
border:none;
border-radius:6px;
background:#f5f5f5;
margin-bottom:10px;
outline:none;
}

.controls{
text-align:center;
margin-bottom:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
flex-grow:1;
}

button{
height:60px;
font-size:18px;
border:none;
border-radius:8px;
background:#616161;
color:white;
cursor:pointer;
transition:0.15s;
}

button:hover{
background:#424242;
}

button:active{
transform:scale(0.95);
}

.history{
background:white;
height:120px;
overflow:auto;
margin-top:10px;
font-size:14px;
padding:8px;
border-radius:6px;
}

.scientific{
display:none;
}

@media(max-width:600px){

body{
padding:0;
}

.calculator{
width:100vw;
height:100vh;
max-width:none;
border-radius:0;
padding:12px;
}

button{
height:58px;
font-size:17px;
}

#display{
font-size:30px;
height:75px;
}

.history{
height:100px;
}

}

</style>

</head>

<body>

<div class="calculator">

<div class="controls">

<button onclick="setMode('simple')">Simple</button>
<button onclick="setMode('scientific')">Scientific</button>
<button onclick="toggleAngle()" id="angleBtn">DEG</button>
<button onclick="toggleTheme()">Theme</button>

</div>

<input id="display" readonly>

<div class="grid">

<button class="scientific" onclick="sinFunc()">sin</button>
<button class="scientific" onclick="cosFunc()">cos</button>
<button class="scientific" onclick="tanFunc()">tan</button>
<button class="scientific" onclick="asinFunc()">sin⁻¹</button>
<button class="scientific" onclick="acosFunc()">cos⁻¹</button>

<button class="scientific" onclick="atanFunc()">tan⁻¹</button>
<button class="scientific" onclick="logFunc()">log</button>
<button class="scientific" onclick="sqrtFunc()">√</button>
<button class="scientific" onclick="press(Math.PI)">π</button>
<button onclick="square()">x²</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="percent()">%</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="clearDisplay()">C</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>
<button onclick="calculate()">=</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press('+')">+</button>
<button onclick="press('**')">xʸ</button>
<button onclick="backspace()">⌫</button>

<button class="scientific" onclick="factorial()">n!</button>
<button class="scientific" onclick="memoryAdd()">M+</button>
<button class="scientific" onclick="memoryRecall()">MR</button>
<button class="scientific" onclick="memoryClear()">MC</button>
<button class="scientific" onclick="press(Math.E)">e</button>

</div>

<div class="history" id="history"></div>

</div>

<script>

let display=document.getElementById("display");
let historyBox=document.getElementById("history");
let angleBtn=document.getElementById("angleBtn");

let degreeMode=true;
let memory=0;
let history=[];

/* BASIC */

function press(val){
display.value+=val;
}

function clearDisplay(){
display.value="";
}

function backspace(){
display.value=display.value.slice(0,-1);
}

function calculate(){

try{

let result=Function('"use strict"; return (' + display.value + ')')();

addHistory(display.value+" = "+result);

display.value=result;

}
catch(err){
console.log(err);
display.value="Invalid";
}

}

function addHistory(entry){

history.unshift(entry);

if(history.length>10){
history.pop();
}

historyBox.innerHTML=history.join("<br>");

}

function percent(){
display.value=parseFloat(display.value)/100;
}

function square(){
display.value=parseFloat(display.value)*parseFloat(display.value);
}

/* FACTORIAL */

function factorial(){

let n=parseInt(display.value);

if(n<0 || isNaN(n)){
display.value="Error";
return;
}

let result=1;

for(let i=1;i<=n;i++){
result*=i;
}

display.value=result;

}

/* MEMORY */

function memoryAdd(){
memory += parseFloat(display.value)||0;
}

function memoryRecall(){
display.value=memory;
}

function memoryClear(){
memory=0;
}

/* ANGLE MODE */

function toggleAngle(){

degreeMode=!degreeMode;

angleBtn.innerText=degreeMode?"DEG":"RAD";

}

function toRad(x){
return degreeMode?x*Math.PI/180:x;
}

function fromRad(x){
return degreeMode?x*180/Math.PI:x;
}

/* TRIG */

function sinFunc(){
display.value=Math.sin(toRad(parseFloat(display.value)));
}

function cosFunc(){
display.value=Math.cos(toRad(parseFloat(display.value)));
}

function tanFunc(){
display.value=Math.tan(toRad(parseFloat(display.value)));
}

function asinFunc(){
display.value=fromRad(Math.asin(parseFloat(display.value)));
}

function acosFunc(){
display.value=fromRad(Math.acos(parseFloat(display.value)));
}

function atanFunc(){
display.value=fromRad(Math.atan(parseFloat(display.value)));
}

/* OTHER */

function logFunc(){
display.value=Math.log10(display.value);
}

function sqrtFunc(){
display.value=Math.sqrt(display.value);
}

/* MODE */

function setMode(mode){

let sci=document.querySelectorAll(".scientific");

sci.forEach(btn=>{
btn.style.display=(mode==="scientific")?"block":"none";
});

}

setMode("simple");

/* THEME */

let dark=false;

function toggleTheme(){

if(!dark){

document.body.style.background="#121212";
document.querySelector(".calculator").style.background="#1e1e1e";

}
else{

document.body.style.background="#e0e0e0";
document.querySelector(".calculator").style.background="#bdbdbd";

}

dark=!dark;

}

/* KEYBOARD SUPPORT */

document.addEventListener("keydown",function(e){

if("0123456789+-*/.".includes(e.key)){
display.value+=e.key;
}

if(e.key==="Enter"){
calculate();
}

if(e.key==="Backspace"){
backspace();
}

if(e.key==="Escape"){
clearDisplay();
}

});

</script>

</body>
</html>
